<!-- Reemplazar la sección de scripts en menu_administrador.html -->
    <script>
        // FUNCIONES GLOBALES PRIMERO - para que estén disponibles en onclick
        function gestionarUsuarios() {
            console.log('Accediendo a gestión de usuarios');
            alert('Módulo de gestión de usuarios próximamente disponible');
        }
        
        function configurarSistema() {
            console.log('Accediendo a configuración del sistema');
            alert('Módulo de configuración próximamente disponible');
        }
        
        function accederArea(area) {
            console.log('Admin accediendo al área:', area);
            
            if (area === 'operaciones') {
                window.location.href = 'index_v2.html';
            } else {
                accederAreaConstruccion(area);
            }
        }
        
        function accederAreaConstruccion(area) {
            console.log('Admin accediendo a área en construcción:', area);
            window.location.href = `construccion.html?area=${area}`;
        }
        
        function mostrarInformacionUsuario() {
            const elementosUsername = document.querySelectorAll('[data-user="username"]');
            elementosUsername.forEach(el => {
                el.textContent = window.currentUser.username || 'Administrador';
            });
        }
        
        // INICIALIZACIÓN DESPUÉS DE DEFINIR LAS FUNCIONES
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Inicializando menú administrador con verificación simple');
            
            const token = localStorage.getItem('aifa_auth_token');
            const userData = localStorage.getItem('aifa_user_data');
            
            if (!token || !userData) {
                console.log('No hay sesión, redirigiendo a login');
                window.location.href = 'login.html';
                return;
            }
            
            try {
                const user = JSON.parse(userData);
                console.log('Usuario encontrado:', user.username, user.rol);
                
                if (user.rol !== 'administrador') {
                    console.log('Rol no válido para menú administrador');
                    window.location.href = 'login.html';
                    return;
                }
                
                // Restaurar currentUser global
                window.currentUser = {
                    id: user.id,
                    username: user.username,
                    email: user.email,
                    rol: user.rol,
                    area: user.area,
                    permisos: user.permisos,
                    isAuthenticated: true
                };
                
                mostrarInformacionUsuario();
                console.log('Menú administrador inicializado correctamente');
                
            } catch (error) {
                console.error('Error procesando datos de usuario:', error);
                window.location.href = 'login.html';
            }
        });
        
        // Atajos de teclado
        document.addEventListener('keydown', function(event) {
            if (event.altKey && event.key === 'u') {
                event.preventDefault();
                gestionarUsuarios();
            }
            
            if (event.altKey && event.key === 's') {
                event.preventDefault();
                configurarSistema();
            }
            
            if (event.altKey && event.key >= '1' && event.key <= '8') {
                event.preventDefault();
                const areas = ['operaciones', 'mercadotecnia', 'gerencia_sms', 'calidad', 'recursos_humanos', 'comercial', 'carga', 'sistemas'];
                const index = parseInt(event.key) - 1;
                if (areas[index]) {
                    accederArea(areas[index]);
                }
            }
            
            if (event.key === 'Escape') {
                const confirmar = confirm('¿Desea cerrar sesión?');
                if (confirmar) {
                    cerrarSesion();
                }
            }
        });
    </script>
