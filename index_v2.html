<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicadores Aviación 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <!-- Menú Principal -->
    <div id="menuPrincipal" class="container mx-auto p-4">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h1 class="text-2xl font-bold text-center mb-6 text-blue-800">Sistema de Indicadores de Aviación</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto">
                <button onclick="showCaptura()" class="bg-blue-600 hover:bg-blue-700 text-white p-6 rounded-lg transition-colors">
                    <div class="text-3xl mb-2">📊</div>
                    <div class="text-xl font-semibold">Módulo de Captura</div>
                    <div class="text-sm opacity-90">Capturar indicadores y metas</div>
                </button>
                <button onclick="showVisualizacion()" class="bg-green-600 hover:bg-green-700 text-white p-6 rounded-lg transition-colors">
                    <div class="text-3xl mb-2">📈</div>
                    <div class="text-xl font-semibold">Visualización</div>
                    <div class="text-sm opacity-90">Consultar y comparar datos</div>
                </button>
            </div>
        </div>
    </div>

    <!-- Módulo de Captura -->
    <div id="moduloCaptura" class="container mx-auto p-4 hidden">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-blue-800">Módulo de Captura</h2>
                <button onclick="showMenu()" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded">← Regresar</button>
            </div>
            
            <!-- Filtros -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium mb-1">Área</label>
                    <select id="fArea" class="w-full border rounded px-3 py-2">
                        <option value="">Seleccionar...</option>
                        <option value="comercial">Aviación Comercial</option>
                        <option value="general">Aviación General</option>
                        <option value="carga">Aviación de Carga</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Indicador</label>
                    <select id="fIndicador" class="w-full border rounded px-3 py-2">
                        <option value="">Seleccionar...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Año</label>
                    <select id="fAnio" class="w-full border rounded px-3 py-2"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Mes</label>
                    <select id="fMes" class="w-full border rounded px-3 py-2"></select>
                </div>
            </div>
            
            <!-- Formulario de captura -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium mb-1">Valor</label>
                    <input type="number" id="fValor" class="w-full border rounded px-3 py-2" step="0.01">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Meta</label>
                    <input type="number" id="fMeta" class="w-full border rounded px-3 py-2" step="0.01">
                </div>
                <div class="flex items-end">
                    <button onclick="guardarMedicion()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded w-full">
                        Guardar
                    </button>
                </div>
            </div>
            
            <!-- Gráfica de líneas -->
            <div class="mb-6">
                <h3 class="text-lg font-semibold mb-4">Comparativo por Años</h3>
                <canvas id="chartCaptura" width="400" height="200"></canvas>
            </div>
            
            <!-- Tabla de datos -->
            <div id="tablaContainer">
                <h3 class="text-lg font-semibold mb-4">Datos Actuales</h3>
                <div class="overflow-x-auto">
                    <table id="tablaCaptura" class="min-w-full border-collapse border border-gray-300">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="border border-gray-300 px-4 py-2">Mes</th>
                                <th class="border border-gray-300 px-4 py-2">Valor</th>
                                <th class="border border-gray-300 px-4 py-2">Meta</th>
                                <th class="border border-gray-300 px-4 py-2">% Cumplimiento</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyCaptura">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Módulo de Visualización - Menú -->
    <div id="menuVisualizacion" class="container mx-auto p-4 hidden">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-green-800">Módulo de Visualización</h2>
                <button onclick="showMenu()" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded">← Regresar</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto">
                <button onclick="showVisualizacionDetalle('pasajeros')" class="bg-purple-600 hover:bg-purple-700 text-white p-6 rounded-lg transition-colors">
                    <div class="text-4xl mb-2">👥</div>
                    <div class="text-xl font-semibold">Pasajeros</div>
                    <div class="text-sm opacity-90">Comercial y General</div>
                </button>
                <button onclick="showVisualizacionDetalle('operaciones')" class="bg-orange-600 hover:bg-orange-700 text-white p-6 rounded-lg transition-colors">
                    <div class="text-4xl mb-2">✈️</div>
                    <div class="text-xl font-semibold">Operaciones</div>
                    <div class="text-sm opacity-90">Comercial y General</div>
                </button>
                <button onclick="showVisualizacionDetalle('carga')" class="bg-red-600 hover:bg-red-700 text-white p-6 rounded-lg transition-colors">
                    <div class="text-4xl mb-2">📦</div>
                    <div class="text-xl font-semibold">Carga</div>
                    <div class="text-sm opacity-90">Operaciones y Toneladas</div>
                </button>
            </div>
        </div>
    </div>

    <!-- Módulo de Visualización - Detalle -->
    <div id="visualizacionDetalle" class="container mx-auto p-4 hidden">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-green-800" id="tituloDetalle">Visualización</h2>
                <button onclick="showVisualizacion()" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded">← Regresar</button>
            </div>
            
            <!-- Filtros -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium mb-1">Años (selección múltiple)</label>
                    <select id="vAnios" multiple class="w-full border rounded px-3 py-2 h-32"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Tipo</label>
                    <select id="vTipo" class="w-full border rounded px-3 py-2"></select>
                </div>
                <div class="flex items-end">
                    <button id="btnAplicar" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded w-full">
                        Aplicar Filtros
                    </button>
                </div>
            </div>
            
            <!-- Tabla de resultados -->
            <div class="overflow-x-auto mb-6">
                <div id="tablaVisualizacion"></div>
            </div>
            
            <!-- Gráfica -->
            <div class="mb-6">
                <h3 class="text-lg font-semibold mb-4">Gráfica Comparativa</h3>
                <canvas id="vChart" width="400" height="200"></canvas>
            </div>
        </div>
    </div>

    <script>
                // PARTE 2: CONFIGURACIÓN Y CONSTANTES - INICIO
        
        // Configuración de Supabase
        const SUPABASE_URL = 'https://zmzdqfonlykuhjjovloa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptemRxZm9ubHlrdWhqam92bG9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY3NTUwNTMsImV4cCI6MjA3MjMzMTA1M30.mqIhVKOK_6-XPu1o0oFW29wRMQieFp7eRg7shHnyv40';
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Constantes
        const MESES = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                      'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

        const AREAS = {
            'comercial': 'Aviación Comercial',
            'general': 'Aviación General',
            'carga': 'Aviación de Carga'
        };

        const INDICADORES = {
            'operaciones': 'Operaciones',
            'pasajeros': 'Pasajeros',
            'toneladas': 'Toneladas Transportadas'
        };

        // Variables globales
        let currentChart = null;
        let vContext = { modo: null };

        // Funciones auxiliares
        const $ = (selector) => document.querySelector(selector);
        const $$ = (selector) => document.querySelectorAll(selector);

        // PARTE 2: CONFIGURACIÓN Y CONSTANTES - FIN
                // PARTE 3: FUNCIONES DE NAVEGACIÓN Y UI - INICIO

        // Funciones de navegación
        function showMenu() {
            $$('.container').forEach(div => div.classList.add('hidden'));
            $('#menuPrincipal').classList.remove('hidden');
        }

        function showCaptura() {
            $$('.container').forEach(div => div.classList.add('hidden'));
            $('#moduloCaptura').classList.remove('hidden');
            initCaptura();
        }

        function showVisualizacion() {
            $$('.container').forEach(div => div.classList.add('hidden'));
            $('#menuVisualizacion').classList.remove('hidden');
        }

        function showVisualizacionDetalle(modo) {
            vContext.modo = modo;
            $$('.container').forEach(div => div.classList.add('hidden'));
            $('#visualizacionDetalle').classList.remove('hidden');
            
            let titulo = '';
            switch(modo) {
                case 'pasajeros': titulo = 'Visualización - Pasajeros'; break;
                case 'operaciones': titulo = 'Visualización - Operaciones'; break;
                case 'carga': titulo = 'Visualización - Carga'; break;
            }
            $('#tituloDetalle').textContent = titulo;
            
            setupVisualFilters();
        }

        // Inicialización del módulo de captura
        function initCaptura() {
            fillYears();
            fillMonths();
            fillAreas();
            setupAreaChange();
        }

        function fillYears() {
            const select = $('#fAnio');
            select.innerHTML = '';
            const currentYear = new Date().getFullYear();
            for (let year = 2022; year <= currentYear; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                if (year === currentYear) option.selected = true;
                select.appendChild(option);
            }
        }

        function fillMonths() {
            const select = $('#fMes');
            select.innerHTML = '';
            const currentMonth = new Date().getMonth() + 1;
            MESES.forEach((mes, index) => {
                const option = document.createElement('option');
                option.value = index + 1;
                option.textContent = mes;
                if (index + 1 === currentMonth) option.selected = true;
                select.appendChild(option);
            });
        }

        function fillAreas() {
            const areaSelect = $('#fArea');
            areaSelect.innerHTML = '<option value="">Seleccionar...</option>';
            Object.entries(AREAS).forEach(([key, value]) => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = value;
                areaSelect.appendChild(option);
            });
        }

        function setupAreaChange() {
            $('#fArea').addEventListener('change', function() {
                const area = this.value;
                const indicadorSelect = $('#fIndicador');
                indicadorSelect.innerHTML = '<option value="">Seleccionar...</option>';
                
                if (area === 'comercial' || area === 'general') {
                    ['operaciones', 'pasajeros'].forEach(ind => {
                        const option = document.createElement('option');
                        option.value = ind;
                        option.textContent = INDICADORES[ind];
                        indicadorSelect.appendChild(option);
                    });
                } else if (area === 'carga') {
                    ['operaciones', 'toneladas'].forEach(ind => {
                        const option = document.createElement('option');
                        option.value = ind;
                        option.textContent = INDICADORES[ind];
                        indicadorSelect.appendChild(option);
                    });
                }
                
                // Cargar datos cuando cambien área e indicador
                indicadorSelect.addEventListener('change', loadCapturaData);
                loadCapturaData();
            });
        }

        // PARTE 3: FUNCIONES DE NAVEGACIÓN Y UI - FIN

                // PARTE 4: FUNCIONES DE DATOS Y VISUALIZACIÓN - INICIO

        // Funciones de datos para captura
        async function loadCapturaData() {
            const area = $('#fArea').value;
            const indicador = $('#fIndicador').value;
            const anio = parseInt($('#fAnio').value);
            
            if (!area || !indicador || !anio) return;
            
            // Cargar datos del año actual
            const { data, error } = await sb
                .from('v_medicion')
                .select('*')
                .eq('area', area)
                .eq('indicador', indicador)
                .eq('anio', anio)
                .order('mes');
                
            if (error) {
                console.error('Error cargando datos:', error);
                return;
            }
            
            updateCapturaTable(data);
            await loadCapturaChart(area, indicador);
        }

        function updateCapturaTable(data) {
            const tbody = $('#tbodyCaptura');
            tbody.innerHTML = '';
            
            for (let mes = 1; mes <= 12; mes++) {
                const mesData = data.find(d => d.mes === mes) || {};
                const tr = document.createElement('tr');
                
                const cumplimiento = mesData.cumplimiento ? `${mesData.cumplimiento}%` : '-';
                const cumplimientoClass = mesData.cumplimiento >= 100 ? 'text-green-600 font-semibold' : 
                                        mesData.cumplimiento >= 80 ? 'text-yellow-600' : 'text-red-600';
                
                tr.innerHTML = `
                    <td class="border border-gray-300 px-4 py-2">${MESES[mes-1]}</td>
                    <td class="border border-gray-300 px-4 py-2 text-right">${mesData.valor || ''}</td>
                    <td class="border border-gray-300 px-4 py-2 text-right">${mesData.meta || ''}</td>
                    <td class="border border-gray-300 px-4 py-2 text-right ${mesData.cumplimiento ? cumplimientoClass : ''}">${cumplimiento}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        async function loadCapturaChart(area, indicador) {
            const anio = parseInt($('#fAnio').value);
            
            // Obtener datos de los últimos 4 años
            const years = [];
            for (let i = 3; i >= 0; i--) {
                years.push(anio - i);
            }
            
            const { data, error } = await sb
                .from('v_medicion')
                .select('anio, mes, valor')
                .eq('area', area)
                .eq('indicador', indicador)
                .in('anio', years)
                .order('anio')
                .order('mes');
                
            if (error) {
                console.error('Error cargando datos del gráfico:', error);
                return;
            }
            
            // Preparar datasets
            const datasets = years.map(year => {
                const yearData = Array(12).fill(null);
                data.filter(d => d.anio === year).forEach(d => {
                    yearData[d.mes - 1] = d.valor;
                });
                
                return {
                    label: year.toString(),
                    data: yearData,
                    borderColor: getColorForYear(year),
                    backgroundColor: getColorForYear(year) + '20',
                    fill: false,
                    tension: 0.1
                };
            });
            
            // Actualizar gráfico
            const ctx = $('#chartCaptura').getContext('2d');
            if (currentChart) currentChart.destroy();
            
            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: MESES,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: {
                            display: true,
                            text: `${AREAS[area]} - ${INDICADORES[indicador]}`
                        },
                        legend: {
                            position: 'bottom'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function getColorForYear(year) {
            const colors = ['#3B82F6', '#EF4444', '#10B981', '#F59E0B', '#8B5CF6'];
            return colors[year % colors.length];
        }

        async function guardarMedicion() {
            const area = $('#fArea').value;
            const indicador = $('#fIndicador').value;
            const anio = parseInt($('#fAnio').value);
            const mes = parseInt($('#fMes').value);
            const valor = parseFloat($('#fValor').value) || 0;
            const meta = parseFloat($('#fMeta').value) || 0;
            
            if (!area || !indicador || !anio || !mes) {
                alert('Por favor complete todos los campos obligatorios');
                return;
            }
            
            const { data, error } = await sb
                .from('medicion')
                .upsert({
                    area,
                    indicador,
                    anio,
                    mes,
                    valor,
                    meta
                });
                
            if (error) {
                alert('Error al guardar: ' + error.message);
            } else {
                alert('Datos guardados correctamente');
                $('#fValor').value = '';
                $('#fMeta').value = '';
                loadCapturaData();
            }
        }

        // Funciones de visualización
        function setupVisualFilters() {
            // Años
            const selY = $('#vAnios');
            selY.innerHTML = '';
            const yNow = new Date().getFullYear();
            for (let y = 2022; y <= yNow; y++) {
                const o = document.createElement('option');
                o.value = y;
                o.textContent = y;
                selY.appendChild(o);
            }

            // Tipo
            const selT = $('#vTipo');
            selT.innerHTML = '';
            if (vContext.modo === 'pasajeros') {
                [['comercial', 'Comercial'], ['general', 'General']].forEach(([v, t]) => {
                    const o = document.createElement('option');
                    o.value = v;
                    o.textContent = t;
                    selT.appendChild(o);
                });
            } else if (vContext.modo === 'operaciones') {
                [['comercial', 'Comercial'], ['general', 'General']].forEach(([v, t]) => {
                    const o = document.createElement('option');
                    o.value = v;
                    o.textContent = t;
                    selT.appendChild(o);
                });
            } else { // carga
                [['operaciones', 'Operaciones'], ['toneladas', 'Toneladas']].forEach(([v, t]) => {
                    const o = document.createElement('option');
                    o.value = v;
                    o.textContent = t;
                    selT.appendChild(o);
                });
            }

            // Configurar event listener para el botón aplicar
            document.getElementById('btnAplicar').onclick = aplicarFiltrosVisualizacion;
        }

        async function aplicarFiltrosVisualizacion() {
            const years = Array.from($('#vAnios').selectedOptions).map(o => parseInt(o.value));
            const tipo = $('#vTipo').value;
            
            if (!tipo) {
                alert('Por favor seleccione un tipo');
                return;
            }
            
            // Mapear a (area, indicador) según modo
            let area, indicador;
            if (vContext.modo === 'pasajeros') {
                area = tipo;
                indicador = 'pasajeros';
            } else if (vContext.modo === 'operaciones') {
                area = tipo;
                indicador = 'operaciones';
            } else { // carga
                area = 'carga';
                indicador = tipo;
            }
            
            const { data, error } = await sb.from('v_medicion')
                .select('anio,mes,valor,meta,cumplimiento')
                .eq('area', area).eq('indicador', indicador)
                .in('anio', years.length ? years : [new Date().getFullYear()])
                .order('anio', { ascending: true }).order('mes', { ascending: true });
                
            if (error) {
                alert(error.message);
                return;
            }
            
            // Pivot: filas = meses, columnas = años
            const uYears = Array.from(new Set(data.map(r => r.anio))).sort();
            const pivot = MESES.map((m, idx) => {
                const row = { mes: m };
                uYears.forEach(y => { 
                    row[`valor_${y}`] = null; 
                    row[`meta_${y}`] = null;
                    row[`cumplimiento_${y}`] = null;
                });
                data.filter(r => r.mes === idx + 1).forEach(r => { 
                    row[`valor_${r.anio}`] = r.valor;
                    row[`meta_${r.anio}`] = r.meta;
                    row[`cumplimiento_${r.anio}`] = r.cumplimiento;
                });
                return row;
            });
            
            // Render tabla con valor, meta y cumplimiento
            const container = $('#tablaVisualizacion');
            container.innerHTML = '';
            
            const table = document.createElement('table');
            table.className = 'min-w-full border-collapse border border-gray-300';
            
            // Header
            const thead = document.createElement('thead');
            thead.className = 'bg-gray-50';
            const trh = document.createElement('tr');
            trh.innerHTML = '<th class="border border-gray-300 px-4 py-2">Mes</th>';
            
            uYears.forEach(y => {
                trh.innerHTML += `
                    <th class="border border-gray-300 px-2 py-2 text-center" colspan="3">${y}</th>
                `;
            });
            thead.appendChild(trh);
            
            // Subheader
            const trSub = document.createElement('tr');
            trSub.innerHTML = '<th class="border border-gray-300 px-4 py-2"></th>';
            uYears.forEach(y => {
                trSub.innerHTML += `
                    <th class="border border-gray-300 px-2 py-1 text-xs">Valor</th>
                    <th class="border border-gray-300 px-2 py-1 text-xs">Meta</th>
                    <th class="border border-gray-300 px-2 py-1 text-xs">%</th>
                `;
            });
            thead.appendChild(trSub);
            table.appendChild(thead);
            
            // Body
            const tbody = document.createElement('tbody');
            pivot.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="border border-gray-300 px-4 py-2 font-medium">${row.mes}</td>`;
                
                uYears.forEach(y => {
                    const valor = row[`valor_${y}`] || '';
                    const meta = row[`meta_${y}`] || '';
                    const cumplimiento = row[`cumplimiento_${y}`];
                    
                    let cumplimientoText = '-';
                    let cumplimientoClass = '';
                    if (cumplimiento !== null && cumplimiento !== undefined) {
                        cumplimientoText = `${cumplimiento}%`;
                        cumplimientoClass = cumplimiento >= 100 ? 'text-green-600 font-semibold' : 
                                          cumplimiento >= 80 ? 'text-yellow-600' : 'text-red-600';
                    }
                    
                    tr.innerHTML += `
                        <td class="border border-gray-300 px-2 py-2 text-right">${valor}</td>
                        <td class="border border-gray-300 px-2 py-2 text-right">${meta}</td>
                        <td class="border border-gray-300 px-2 py-2 text-right ${cumplimientoClass}">${cumplimientoText}</td>
                    `;
                });
                
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            container.appendChild(table);
            
            // Gráfica a partir de los valores (una serie por año)
            const ds = uYears.map(y => ({
                label: y.toString(),
                data: pivot.map(r => r[`valor_${y}`]),
                borderColor: getColorForYear(y),
                backgroundColor: getColorForYear(y) + '20',
                fill: false,
                tension: 0.1
            }));
            
            const ctx = document.getElementById('vChart').getContext('2d');
            if (window.vChart) window.vChart.destroy();

            // Título dinámico para la gráfica
            let chartTitle = '';
            if (vContext.modo === 'pasajeros') {
                chartTitle = `${tipo === 'comercial' ? 'Aviación Comercial' : 'Aviación General'} - Pasajeros`;
            } else if (vContext.modo === 'operaciones') {
                chartTitle = `${tipo === 'comercial' ? 'Aviación Comercial' : 'Aviación General'} - Operaciones`;
            } else {
                chartTitle = `Aviación de Carga - ${tipo === 'operaciones' ? 'Operaciones' : 'Toneladas'}`;
            }

            window.vChart = new Chart(ctx, {
                type: 'line',
                data: { labels: MESES, datasets: ds },
                options: {
                    responsive: true,
                    plugins: {
                        title: {
                            display: true,
                            text: chartTitle
                        },
                        legend: { position: 'bottom' }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: vContext.modo === 'carga' && tipo === 'toneladas' ? 'Toneladas' : 
                                      vContext.modo === 'pasajeros' ? 'Número de Pasajeros' : 'Número de Operaciones'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Meses'
                            }
                        }
                    }
                }
            });
        }

        // PARTE 4: FUNCIONES DE DATOS Y VISUALIZACIÓN - FIN

        // Inicialización cuando carga la página
        document.addEventListener('DOMContentLoaded', function() {
            showMenu();
        });
    </script>
</body>
</html>
