<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Indicadores 2.0 – MVP</title>
  <!-- Tailwind (CDN para MVP) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS (UMD: define window.supabase) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <div class="max-w-7xl mx-auto p-4 md:p-8">
    <header class="mb-6">
      <h1 class="text-2xl md:text-3xl font-bold">Indicadores 2.0 – MVP</h1>
      <p class="text-sm text-slate-600">Demo con Captura y Consulta</p>
    </header>

    <!-- HOME / MENÚ PRINCIPAL -->
    <section id="secHome" class="grid sm:grid-cols-2 gap-6">
      <button id="btnGoCaptura" class="bg-white rounded-2xl shadow p-6 text-left hover:ring-2">
        <div class="text-4xl">📝</div>
        <div class="mt-2 text-xl font-semibold">Captura</div>
        <p class="text-slate-600 text-sm mt-1">Registrar valores, metas y ver comparativa anual.</p>
      </button>
      <button id="btnGoConsulta" class="bg-white rounded-2xl shadow p-6 text-left hover:ring-2">
        <div class="text-4xl">📊</div>
        <div class="mt-2 text-xl font-semibold">Consulta</div>
        <p class="text-slate-600 text-sm mt-1">Visualizar por Pasajeros / Operaciones / Carga.</p>
      </button>
    </section>

    <!-- CAPTURA -->
    <section id="secCaptura" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">Captura</h2>
        <button id="btnBackHome1" class="px-3 py-2 rounded-xl bg-slate-200">← Inicio</button>
      </div>
      <div class="grid md:grid-cols-2 gap-6">
        <div class="bg-white rounded-2xl shadow p-4 md:p-6">
          <h3 class="text-lg font-semibold mb-4">Módulo de captura</h3>
          <form id="formCaptura" class="grid grid-cols-2 gap-3">
            <label class="col-span-2">Área
              <select id="area" class="w-full mt-1 px-3 py-2 rounded-xl border">
                <option value="comercial">Aviación Comercial</option>
                <option value="general">Aviación General</option>
                <option value="carga">Aviación de Carga</option>
              </select>
            </label>
            <label class="col-span-2">Indicador
              <select id="indicador" class="w-full mt-1 px-3 py-2 rounded-xl border"></select>
            </label>
            <label>Año
              <input id="anio" type="number" min="2022" max="2100" class="w-full mt-1 px-3 py-2 rounded-xl border" />
            </label>
            <label>Mes
              <select id="mes" class="w-full mt-1 px-3 py-2 rounded-xl border"></select>
            </label>
            <label>Valor
              <input id="valor" type="number" step="0.01" class="w-full mt-1 px-3 py-2 rounded-xl border" />
            </label>
            <label>Meta
              <input id="meta" type="number" step="0.01" class="w-full mt-1 px-3 py-2 rounded-xl border" />
            </label>
            <div class="col-span-2 text-sm text-slate-600">% Cumplimiento: <span id="pct" class="font-semibold">—</span></div>
            <div class="col-span-2 flex gap-2 mt-2">
              <button class="px-4 py-2 rounded-xl bg-indigo-600 text-white" type="submit">Guardar</button>
              <button id="btnLimpiar" class="px-4 py-2 rounded-xl bg-slate-200" type="button">Limpiar</button>
            </div>
            <p id="msg" class="col-span-2 text-sm mt-2"></p>
          </form>
        </div>

        <div class="bg-white rounded-2xl shadow p-4 md:p-6">
          <h3 class="text-lg font-semibold mb-4">Comparativa anual (líneas)</h3>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <label>Área
              <select id="fArea" class="w-full mt-1 px-3 py-2 rounded-xl border">
                <option value="comercial">Aviación Comercial</option>
                <option value="general">Aviación General</option>
                <option value="carga">Aviación de Carga</option>
              </select>
            </label>
            <label>Indicador
              <select id="fIndicador" class="w-full mt-1 px-3 py-2 rounded-xl border"></select>
            </label>
          </div>
          <canvas id="lineChart" height="140"></canvas>
          <p id="notice" class="text-sm text-slate-500 mt-2"></p>
        </div>
      </div>
    </section>

    <!-- CONSULTA -->
    <section id="secVisual" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">Consulta</h2>
        <button id="btnBackHome2" class="px-3 py-2 rounded-xl bg-slate-200">← Inicio</button>
      </div>

      <!-- Menú de Consulta (3 íconos) -->
      <div id="menuVisual" class="grid sm:grid-cols-3 gap-4 mb-6">
        <button data-vmenu="pasajeros" class="bg-white rounded-2xl shadow p-6 hover:ring-2 text-left">
          <div class="text-3xl">🧍‍➡️🧍‍⬅️</div>
          <div class="mt-2 font-semibold">Pasajeros (Comercial / General)</div>
        </button>
        <button data-vmenu="operaciones" class="bg-white rounded-2xl shadow p-6 hover:ring-2 text-left">
          <div class="text-3xl">🛫🛬</div>
          <div class="mt-2 font-semibold">Operaciones (Comercial / General)</div>
        </button>
        <button data-vmenu="carga" class="bg-white rounded-2xl shadow p-6 hover:ring-2 text-left">
          <div class="text-3xl">📦✈️</div>
          <div class="mt-2 font-semibold">Carga (Operaciones / Toneladas)</div>
        </button>
      </div>

      <button id="btnRegresar" class="hidden mb-4 px-3 py-2 rounded-xl bg-slate-200">← Menú de consulta</button>

      <div id="visualPanel" class="hidden bg-white rounded-2xl shadow p-4 md:p-6">
        <div class="grid md:grid-cols-3 gap-3 mb-4">
          <label>Año(s)
            <select id="vAnios" multiple size="6" class="w-full mt-1 px-3 py-2 rounded-xl border"></select>
          </label>
          <label>Tipo
            <select id="vTipo" class="w-full mt-1 px-3 py-2 rounded-xl border"></select>
          </label>
          <div class="flex items-end"><button id="btnAplicar" class="w-full px-4 py-2 rounded-xl bg-indigo-600 text-white">Aplicar filtros</button></div>
        </div>
        <div class="overflow-x-auto">
          <table id="vTabla" class="min-w-full border text-sm"></table>
        </div>
        <div class="mt-4">
          <canvas id="vChart" height="120"></canvas>
        </div>
      </div>
    </section>
  </div>

<script>
/* ====== CONFIG SUPABASE ====== */
const SUPABASE_URL = "https://zmzdqfonlykuhjjovloa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptemRxZm9ubHlrdWhqam92bG9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY3NTUwNTMsImV4cCI6MjA3MjMzMTA1M30.mqIhVKOK_6-XPu1o0oFW29wRMQieFp7eRg7shHnyv40";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* Diagnóstico al cargar */
(async () => {
  console.log('supabase global OK?', typeof supabase, !!supabase?.createClient);
  const { count, error } = await sb.from('medicion').select('*', { head:true, count:'exact' });
  console.log('filas visibles por RLS en public.medicion =', count, 'error=', error);
})();

/* ====== CONSTANTES ====== */
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const INDICADORES_POR_AREA = {
  comercial: ["operaciones","pasajeros"],
  general:   ["operaciones","pasajeros"],
  carga:     ["operaciones","toneladas"]
};

/* ====== UTIL ====== */
const $ = (sel) => document.querySelector(sel);
function clamp(n, lo, hi){ return Math.max(lo, Math.min(hi, n)); }

/* ====== NAVEGACIÓN ====== */
const secHome    = $('#secHome');
const secCaptura = $('#secCaptura');
const secVisual  = $('#secVisual');
const btnGoCaptura = $('#btnGoCaptura');
const btnGoConsulta = $('#btnGoConsulta');
const btnBackHome1 = $('#btnBackHome1');
const btnBackHome2 = $('#btnBackHome2');

function show(section){
  [secHome, secCaptura, secVisual].forEach(s => s.classList.add('hidden'));
  section.classList.remove('hidden');
}
btnGoCaptura.onclick = () => { show(secCaptura); fillIndicadores($('#fArea'), $('#fIndicador')); loadLine(); };
btnGoConsulta.onclick = () => { show(secVisual); setupVisualFilters(); };
btnBackHome1.onclick = () => show(secHome);
btnBackHome2.onclick = () => show(secHome);

/* ====== CAPTURA ====== */
/* Rellenar meses */
(function initMeses(){
  const sel = $('#mes');
  MESES.forEach((m,i)=>{ const o=document.createElement('option'); o.value=i+1; o.textContent=m; sel.appendChild(o); });
})();

/* Rellenar indicadores según área (siempre deja uno seleccionado) */
function fillIndicadores(areaSel, indSel){
  indSel.innerHTML = '';
  (INDICADORES_POR_AREA[areaSel.value] || []).forEach(v=>{
    const o=document.createElement('option');
    o.value=v; o.textContent=v.charAt(0).toUpperCase()+v.slice(1);
    indSel.appendChild(o);
  });
  if (!indSel.value && indSel.options.length) indSel.selectedIndex = 0;
}
fillIndicadores($('#area'), $('#indicador'));
fillIndicadores($('#fArea'), $('#fIndicador'));
$('#area').onchange = ()=> fillIndicadores($('#area'), $('#indicador'));
$('#fArea').onchange = ()=> { fillIndicadores($('#fArea'), $('#fIndicador')); loadLine(); };
$('#fIndicador').onchange = ()=> loadLine();

/* Año por defecto */
(function initAnios(){ $('#anio').value = new Date().getFullYear(); })();

/* % cumplimiento en vivo */
function updatePct(){
  const v = parseFloat($('#valor').value || '');
  const m = parseFloat($('#meta').value || '');
  const pct = (m>0 && v>=0) ? (v/m*100) : NaN;
  $('#pct').textContent = isFinite(pct) ? pct.toFixed(1)+"%" : '—';
}
['valor','meta'].forEach(id=> $('#'+id).addEventListener('input', updatePct));

/* Guardar (upsert por llave única) */
$('#formCaptura').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const payload = {
    area: $('#area').value,
    indicador: $('#indicador').value,
    anio: clamp(parseInt($('#anio').value||0), 2022, 2100),
    mes:  clamp(parseInt($('#mes').value||1), 1, 12),
    valor: parseFloat($('#valor').value||0),
    meta:  parseFloat($('#meta').value||0)
  };
  const { error } = await sb.from('medicion').upsert(payload, { onConflict: 'area,indicador,anio,mes' });
  const msg = $('#msg');
  if(error){ msg.textContent = 'Error: '+error.message; msg.className='text-red-600'; }
  else { msg.textContent = 'Guardado ✔'; msg.className='text-green-600'; loadLine(); }
});
$('#btnLimpiar').onclick = ()=>{ ['valor','meta'].forEach(id=> $('#'+id).value=''); updatePct(); $('#msg').textContent=''; };

/* Gráfica de líneas (robusta) */
let lineChart;
async function loadLine() {
  const area = ($('#fArea')?.value) || 'comercial';
  const indSel = $('#fIndicador');
  const indicador = (indSel && indSel.value) ? indSel.value : 'operaciones';
  const notice = $('#notice');

  try {
    const { data, error } = await sb
      .from('medicion')
      .select('anio,mes,valor')
      .eq('area', area)
      .eq('indicador', indicador)
      .order('anio', { ascending: true })
      .order('mes', { ascending: true });

    if (error) { console.error('Supabase error:', error); return; }

    if (!data || data.length === 0) {
      notice.textContent = 'Sin datos para los filtros seleccionados.';
      if (lineChart) lineChart.destroy();
      const ctx = document.getElementById('lineChart').getContext('2d');
      lineChart = new Chart(ctx, { type:'line', data:{ labels: MESES, datasets: [] },
        options:{ plugins:{ legend:{ display:false } } }});
      return;
    } else {
      notice.textContent = '';
    }

    const byYear = {};
    data.forEach(r => { (byYear[r.anio] ||= Array(12).fill(null))[r.mes - 1] = r.valor; });
    const years = Object.keys(byYear);
    const ds = years.map(y => ({ label: y, data: byYear[y] }));

    const ctx = document.getElementById('lineChart').getContext('2d');
    if (lineChart) lineChart.destroy();
    lineChart = new Chart(ctx, {
      type: 'line',
      data: { labels: MESES, datasets: ds },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });
  } catch (e) {
    console.error('loadLine exception:', e);
  }
}

/* ====== CONSULTA ====== */
const menuBtns = Array.from(document.querySelectorAll('#menuVisual [data-vmenu]'));
const btnRegresar = $('#btnRegresar');
const visualPanel = $('#visualPanel');
let vContext = { modo: null }; // pasajeros | operaciones | carga

menuBtns.forEach(btn=>{
  btn.onclick = ()=>{
    vContext.modo = btn.dataset.vmenu;
    $('#menuVisual').classList.add('hidden');
    btnRegresar.classList.remove('hidden');
    visualPanel.classList.remove('hidden');
    setupVisualFilters();
  };
});
btnRegresar.onclick = ()=>{
  $('#menuVisual').classList.remove('hidden');
  btnRegresar.classList.add('hidden');
  visualPanel.classList.add('hidden');
};

function setupVisualFilters(){
  // Años
  const selY = $('#vAnios'); selY.innerHTML='';
  const yNow = new Date().getFullYear();
  for(let y=2022; y<=yNow; y++){ const o=document.createElement('option'); o.value=y; o.textContent=y; selY.appendChild(o); }
  // Tipo
  const selT = $('#vTipo'); selT.innerHTML='';
  if(vContext.modo === 'pasajeros'){
    [['comercial','Comercial'],['general','General']].forEach(([v,t])=>{ const o=document.createElement('option'); o.value=v; o.textContent=t; selT.appendChild(o); });
  } else if(vContext.modo === 'operaciones'){
    [['comercial','Comercial'],['general','General']].forEach(([v,t])=>{ const o=document.createElement('option'); o.value=v; o.textContent=t; selT.appendChild(o); });
  } else { // carga
    [['operaciones','Operaciones'],['toneladas','Toneladas']].forEach(([v,t])=>{ const o=document.createElement('option'); o.value=v; o.textContent=t; selT.appendChild(o); });
  }
}

$('#btnAplicar').onclick = async ()=>{
  const years = Array.from($('#vAnios').selectedOptions).map(o=>parseInt(o.value));
  const tipo = $('#vTipo').value;
  // Mapear a (area, indicador)
  let area, indicador;
  if(vContext.modo==='pasajeros'){ area = tipo; indicador='pasajeros'; }
  else if(vContext.modo==='operaciones'){ area = tipo; indicador='operaciones'; }
  else { area='carga'; indicador=tipo; }

  const { data, error } = await sb.from('medicion')
    .select('anio,mes,valor')
    .eq('area', area).eq('indicador', indicador)
    .in('anio', years.length? years: [new Date().getFullYear()])
    .order('anio', { ascending: true }).order('mes', { ascending: true });
  if(error){ alert(error.message); return; }

  // Pivot: filas = meses, columnas = años
  const uYears = Array.from(new Set(data.map(r=>r.anio))).sort();
  const pivot = MESES.map((m, idx)=>{
    const row = { mes: m };
    uYears.forEach(y=>{ row[y] = null; });
    data.filter(r=>r.mes===idx+1).forEach(r=>{ row[r.anio] = r.valor; });
    return row;
  });

  // Render tabla
  const tbl = $('#vTabla');
  tbl.innerHTML = '';
  const thead = document.createElement('thead');
  const trh = document.createElement('tr');
  trh.innerHTML = '<th class="border px-2 py-1">Mes</th>' + uYears.map(y=>`<th class="border px-2 py-1 text-right">${y}</th>`).join('');
  thead.appendChild(trh); tbl.appendChild(thead);
  const tbody = document.createElement('tbody');
  pivot.forEach(row=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="border px-2 py-1">${row.mes}</td>` + uYears.map(y=>`<td class="border px-2 py-1 text-right">${row[y]??''}</td>`).join('');
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);

  // Gráfica (una serie por año)
  const ds = uYears.map(y=>({ label: y.toString(), data: pivot.map(r=>r[y]) }));
  const ctx = document.getElementById('vChart').getContext('2d');
  if(window.vChart) window.vChart.destroy();
  window.vChart = new Chart(ctx, { type:'line', data:{ labels: MESES, datasets: ds }, options:{ responsive:true, plugins:{ legend:{ position:'bottom' } } } });
};
</script>
</body>
</html>
