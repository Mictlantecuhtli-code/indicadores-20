<script>
document.addEventListener('DOMContentLoaded', () => {
  console.log('=== DEBUG LOGIN INIT ===');

  // Si ya hay sesión, redirige
  try {
    const s = (typeof readSession === 'function') ? readSession() : { token:null, userStr:null };
    console.log('Session at load:', s);
    if (s.token && s.userStr) {
      const to = localStorage.getItem('aifa_redirect_after_login') || 'index_v2.html';
      console.log('Ya hay sesión. Redirigiendo a:', to);
      window.location.href = to;
      return;
    }
  } catch (e) { console.warn('No se pudo leer sesión al cargar login:', e); }

  function showMsg(msg, type='error') {
    if (typeof mostrarNotificacion === 'function') { mostrarNotificacion(msg, type); }
    else { if (type==='error') console.error(msg); else console.log(msg); }
  }
  function setLoading(on) {
    const btn = document.getElementById('btnLogin');
    if (!btn) return;
    if (on) { btn.disabled = true; btn.dataset._old = btn.innerHTML; btn.innerHTML = 'Verificando...'; }
    else { btn.disabled = false; btn.innerHTML = btn.dataset._old || 'Entrar'; }
  }

  const form = document.getElementById('formLogin') || document.getElementById('loginForm');
  if (!form) { console.error('No se encontró el formulario de login'); return; }

  form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const username = (document.getElementById('username')?.value || '').trim();
    const password = (document.getElementById('password')?.value || '').trim();
    const remember = !!document.getElementById('remember')?.checked;

    if (!username || !password) { showMsg('Capture usuario y contraseña.', 'error'); return; }
    if (!window.authSystem || typeof authSystem.login !== 'function') { showMsg('Sistema de autenticación no disponible.', 'error'); return; }

    try {
      setLoading(true);
      console.log('[LOGIN] Autenticando con authSystem.login');
      await authSystem.login(username, password, remember);

      const go = localStorage.getItem('aifa_redirect_after_login') || 'index_v2.html';
      localStorage.removeItem('aifa_redirect_after_login');
      showMsg('Acceso concedido. Redirigiendo…', 'ok');
      setTimeout(() => { window.location.href = go; }, 120);
    } catch (e) {
      console.error('[LOGIN] Error:', e);
      showMsg(e?.message || 'No fue posible iniciar sesión.', 'error');
    } finally {
      setLoading(false);
    }
  });
});
</script>
